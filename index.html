<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdowned</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-dark mode-split">
  <div id="app-container">
    
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo-area">
          <svg class="logo-icon" viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M3 5h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2zm0 2v10h18V7H3zm2 2h3v2H5V9zm0 4h3v2H5v-2zm5-4h9v2h-9V9zm0 4h9v2h-9v-2z"/>
          </svg>
          <span class="logo">Markdowned</span>
        </div>
        <div class="sidebar-actions">
          <button id="btn-new-file" title="New File (Ctrl+N)">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
          </button>
          <button id="btn-open-folder" title="Open Folder (Ctrl+Shift+O)">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/>
            </svg>
          </button>
        </div>
      </div>
      
      <div class="sidebar-tabs">
        <button id="tab-files" class="tab-btn active">Files</button>
        <button id="tab-outline" class="tab-btn">Outline</button>
        <button id="tab-recent" class="tab-btn">Recent</button>
      </div>

      <div class="sidebar-content">
        <!-- Files Panel -->
        <div id="panel-files" class="panel active">
          <div class="empty-state" id="sidebar-empty">
            <svg viewBox="0 0 24 24" width="32" height="32" class="empty-icon">
              <path fill="currentColor" d="M13.92 2.01a5.002 5.002 0 0 0-4.78 3.51L8.5 7.8A5 5 0 0 0 3 12.5v5a5 5 0 0 0 5 5h8a5 5 0 0 0 5-5v-5a5 5 0 0 0-3.32-4.71l-.5-1.74a5 5 0 0 0-4.78-3.51zM10.9 5.86a3 3 0 0 1 2.87-2.1c1.37 0 2.53.92 2.87 2.1l.48 1.64h-6.7l.48-1.64zM5 12.5a3 3 0 0 1 3-3h8a3 3 0 0 1 3 3v.5H5v-.5zm0 2.5h14v2.5a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3V15z"/>
            </svg>
            <p>No workspace folder opened.</p>
            <button id="btn-open-folder-prompt" class="btn-primary">Open Folder</button>
          </div>
          <div id="file-tree" class="file-tree"></div>
        </div>

        <!-- Outline Panel -->
        <div id="panel-outline" class="panel">
          <div class="empty-state" id="outline-empty">
            <svg viewBox="0 0 24 24" width="32" height="32" class="empty-icon">
              <path fill="currentColor" d="M3 9h14V7H3v2zm0 4h14v-2H3v2zm0 4h14v-2H3v2zm16 0h2v-2h-2v2zm0-10v2h2V7h-2zm0 6h2v-2h-2v2z"/>
            </svg>
            <p>No headings in document.</p>
          </div>
          <div id="outline-tree" class="outline-tree"></div>
        </div>

        <!-- Recent Panel -->
        <div id="panel-recent" class="panel">
          <div class="empty-state" id="recent-empty">
            <svg viewBox="0 0 24 24" width="32" height="32" class="empty-icon">
              <path fill="currentColor" d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6a7 7 0 1 1 7 7 7.07 7.07 0 0 1-6-3.38L4.62 18.1A8.93 8.93 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v6l5.25 3.15.75-1.23-4.5-2.67V8z"/>
            </svg>
            <p>No recently opened files.</p>
          </div>
          <div id="recent-list" class="recent-list"></div>
        </div>
      </div>
      
      <div class="sidebar-resize-handle" id="sidebar-resize-handle"></div>
    </aside>

    <!-- Main Workspace -->
    <main id="main-workspace">
      <!-- Invisible trigger to reveal header on hover in Focus Mode -->
      <div class="focus-header-trigger"></div>
      
      <!-- Toolbar / Header -->
      <header id="app-header">
        <div class="header-left">
          <button id="btn-toggle-sidebar" class="header-btn" title="Toggle Sidebar (Ctrl+\)">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 16H5V5h7v14zm7 0h-5V5h5v14z"/>
            </svg>
          </button>
          
          <!-- Custom App Menu -->
          <div class="app-menu-container">
            <button id="btn-app-menu" class="header-btn" title="Menu (Alt+M)">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
              </svg>
            </button>
            <div id="custom-menu-dropdown" class="custom-menu-dropdown">
              <!-- Dynamically built menu items -->
            </div>
          </div>

          <!-- Command Palette Button -->
          <button id="btn-command-palette" class="header-btn" title="Command Palette (Ctrl+Shift+P)">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path fill="currentColor" d="M5.59 7.41L10.18 12l-4.59 4.59L7 18l6-6-6-6-1.41 1.41zM16 16h8v2h-8v-2z"/>
            </svg>
          </button>

          <div class="file-info">
            <span id="current-filename">Untitled.md</span>
            <span id="save-indicator" class="unsaved-dot"></span>
          </div>
        </div>

        <div class="header-right">
          <!-- Mode selectors -->
          <div class="segmented-control mode-selector">
            <button id="mode-write" class="mode-btn" title="Write Mode (Ctrl+Alt+1)">Write</button>
            <button id="mode-live" class="mode-btn" title="Live Mode (Ctrl+Alt+2)">Live</button>
            <button id="mode-split" class="mode-btn active" title="Split Mode (Ctrl+Alt+3)">Split</button>
            <button id="mode-preview" class="mode-btn" title="Preview Mode (Ctrl+Alt+4)">Preview</button>
          </div>

          <!-- Format Toggle Button -->
          <button id="btn-toggle-toolbar" class="header-btn" title="Toggle Formatting Toolbar (Ctrl+Alt+P)">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path fill="currentColor" d="M11.64 5.92L6.14 18h2.32l1.12-2.73h5.71L16.4 18h2.32l-5.46-12.08H11.64zm-1.32 7.37l2.14-5.23 2.14 5.23h-4.28zM4 20h16v2H4v-2z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Collapsible Formatting Toolbar -->
      <div id="collapsible-toolbar" class="collapsible-toolbar collapsed">
        <div class="editor-toolbar">
          <button id="tb-bold" class="tb-btn" title="Bold (Ctrl+B)">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM9.5 6h4c1.1 0 2 .9 2 2s-.9 2-2 2h-4V6zm4.5 12h-4v-4h4c1.1 0 2 .9 2 2s-.9 2-2 2z"/></svg>
          </button>
          <button id="tb-italic" class="tb-btn" title="Italic (Ctrl+I)">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/></svg>
          </button>
          <button id="tb-code" class="tb-btn" title="Inline Code (Ctrl+`)">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
          </button>
          <button id="tb-link" class="tb-btn" title="Link (Ctrl+K)">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
          </button>
          <span class="toolbar-separator"></span>
          <button id="tb-h1" class="tb-btn" title="Heading 1 (Ctrl+1)">H1</button>
          <button id="tb-h2" class="tb-btn" title="Heading 2 (Ctrl+2)">H2</button>
          <button id="tb-h3" class="tb-btn" title="Heading 3 (Ctrl+3)">H3</button>
          <span class="toolbar-separator"></span>
          <button id="tb-ul" class="tb-btn" title="Unordered List (Ctrl+L)">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zM7 19h14v-2H7v2zm0-6h14v-2H7v2zm0-8v2h14V5H7z"/></svg>
          </button>
          <button id="tb-ol" class="tb-btn" title="Ordered List (Ctrl+Shift+L)">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M2 17h2v.5H3v1h1v.5H2v1h3v-4H2v1zm1-9h1V4H2v1h1v3zm-1 3h1.8L2 13.1v.9h3v-1H3.2L5 10.9v-.9H2v1zm5-6v2h14V5H7zm0 14h14v-2H7v2zm0-6h14v-2H7v2z"/></svg>
          </button>
          <button id="tb-quote" class="tb-btn" title="Blockquote">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/></svg>
          </button>
          <button id="tb-table" class="tb-btn" title="Table">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-12 6H5V6h2v3zm4.5 0H8.5V6h3.5v3zm6.5 0h-5V6h5v3zM5 13.5v-3h2v3H5zm3.5 0v-3h3.5v3H8.5zm10.5 0h-5v-3h5v3zM5 18v-3h2v3H5zm3.5 0v-3h3.5v3H8.5zm10.5 0h-5v-3h5v3z"/></svg>
          </button>
        </div>
      </div>

      <!-- Content Area -->
      <div id="content-container">
        
        <!-- Editor Frame -->
        <div id="editor-frame" class="pane-frame">
          <div class="editor-scroll-container" id="editor-scroll-container">
            <!-- We wrap textarea in a paper class to mimic Typora's layout -->
            <div class="editor-paper">
              <div id="editor"></div>
            </div>
          </div>
        </div>

        <!-- Live Editor Frame -->
        <div id="live-editor-frame" class="pane-frame">
          <div class="editor-scroll-container" id="live-editor-scroll-container">
            <div class="editor-paper">
              <div id="live-editor"></div>
            </div>
          </div>
        </div>

        <!-- Divider (resizable in split mode) -->
        <div id="pane-divider" class="pane-divider"></div>

        <!-- Preview Frame -->
        <div id="preview-frame" class="pane-frame">
          <div class="preview-scroll-container" id="preview-scroll-container">
            <div class="preview-paper">
              <article id="preview" class="markdown-body"></article>
            </div>
          </div>
        </div>

      </div>

      <!-- Status Bar -->
      <footer id="status-bar">
        <div class="status-left">
          <svg viewBox="0 0 24 24" width="12" height="12" class="status-icon">
            <path fill="currentColor" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
          </svg>
          <span id="filepath-display">New File</span>
        </div>
        <div class="status-right">
          <span id="focus-indicator" class="status-pill hide">Focus Mode</span>
          <span id="typewriter-indicator" class="status-pill hide">Typewriter Mode</span>
          <span class="status-divider">|</span>
          <span id="char-count">0 chars</span>
          <span class="status-divider">|</span>
          <span id="word-count">0 words</span>
          <span class="status-divider">|</span>
          <span id="read-time">0 min read</span>
        </div>
      </footer>

    </main>

  </div>

  <!-- Selection Bubble Toolbar -->
  <div id="bubble-toolbar" class="bubble-toolbar">
    <button class="bubble-btn" data-action="bold" title="Bold (Ctrl+B)">
      <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM9.5 6h4c1.1 0 2 .9 2 2s-.9 2-2 2h-4V6zm4.5 12h-4v-4h4c1.1 0 2 .9 2 2s-.9 2-2 2z"/></svg>
    </button>
    <button class="bubble-btn" data-action="italic" title="Italic (Ctrl+I)">
      <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/></svg>
    </button>
    <button class="bubble-btn" data-action="code" title="Inline Code (Ctrl+`)">
      <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
    </button>
    <button class="bubble-btn" data-action="link" title="Link (Ctrl+K)">
      <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
    </button>
    <span class="bubble-separator"></span>
    <button class="bubble-btn" data-action="h1" title="Heading 1">H1</button>
    <button class="bubble-btn" data-action="h2" title="Heading 2">H2</button>
    <button class="bubble-btn" data-action="h3" title="Heading 3">H3</button>
    <span class="bubble-separator"></span>
    <button class="bubble-btn" data-action="ul" title="Bullet List">
      <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zM7 19h14v-2H7v2zm0-6h14v-2H7v2zm0-8v2h14V5H7z"/></svg>
    </button>
    <button class="bubble-btn" data-action="ol" title="Numbered List">
      <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M2 17h2v.5H3v1h1v.5H2v1h3v-4H2v1zm1-9h1V4H2v1h1v3zm-1 3h1.8L2 13.1v.9h3v-1H3.2L5 10.9v-.9H2v1zm5-6v2h14V5H7zm0 14h14v-2H7v2zm0-6h14v-2H7v2z"/></svg>
    </button>
    <button class="bubble-btn" data-action="quote" title="Blockquote">
      <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/></svg>
    </button>
  </div>

  <!-- Command Palette Modal Overlay -->
  <div id="command-palette-modal" class="modal-overlay hidden">
    <div class="command-palette-card">
      <div class="command-palette-search">
        <svg viewBox="0 0 24 24" width="18" height="18" class="search-icon">
          <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" id="command-palette-input" placeholder="Search commands... (e.g. 'theme', 'save')" autocomplete="off">
        <kbd class="escape-kbd">ESC</kbd>
      </div>
      <div id="command-palette-results" class="command-palette-results">
        <!-- Dynamically populated commands -->
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
